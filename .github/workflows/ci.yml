name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.changes.outputs.docs_only }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect documentation-only changes
        id: changes
        shell: bash
        env:
          PR_LABELS: ${{ github.event_name == 'pull_request' && join(github.event.pull_request.labels.*.name, ',') || '' }}
        run: |
          set -euo pipefail

          docs_only=false
          docs_only_label=false

          if [[ ",${PR_LABELS}," == *",ci:docs-only,"* ]]; then
            docs_only_label=true
          fi

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" =~ ^0+$ ]]; then
              base="$(git rev-list --max-parents=0 "$head")"
            fi
          fi

          mapfile -t changed_files < <(git diff --name-only "$base" "$head")

          if (( ${#changed_files[@]} > 0 )); then
            docs_only=true
            for path in "${changed_files[@]}"; do
              case "$path" in
                README.md|SECURITY.md|LICENSE|CHANGELOG.md|CONTRIBUTING.md|docs/*|.github/*.md)
                  ;;
                *)
                  docs_only=false
                  ;;
              esac
            done
          fi

          if [[ "$docs_only_label" == "true" && "$docs_only" != "true" ]]; then
            echo "The ci:docs-only label can only be used when all changes are documentation-only." >&2
            printf 'Changed files:\n' >&2
            printf '  %s\n' "${changed_files[@]}" >&2
            exit 1
          fi

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

      - name: Skip tests for documentation-only changes
        if: steps.changes.outputs.docs_only == 'true'
        run: echo "Documentation-only change detected; skipping npm install, build, and tests."

      - name: Set up Node.js
        if: steps.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.changes.outputs.docs_only != 'true'
        run: npm ci

      - name: Run tests
        if: steps.changes.outputs.docs_only != 'true'
        run: npm test

  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Skip Docker build for documentation-only changes
        if: needs.test.outputs.docs_only == 'true'
        run: echo "Documentation-only change detected; skipping Docker build."

      - name: Check out repository
        if: needs.test.outputs.docs_only != 'true'
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        if: needs.test.outputs.docs_only != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: needs.test.outputs.docs_only != 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: needs.test.outputs.docs_only != 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        if: needs.test.outputs.docs_only != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
